<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Student Management</title>
    <style>
        body {
            background: #e8eefa;
            font-family: Arial, sans-serif;
        }
        .login-box {
            max-width: 380px;
            margin: 120px auto;
            background: white;
            padding: 32px 24px 24px 24px;
            border-radius: 14px;
            box-shadow: 0 8px 28px rgba(50,60,100,0.15);
            text-align: center;
        }
        h2 {
            color: #214478;
            margin-bottom: 28px;
        }
        input[type="text"], input[type="password"] {
            width: 92%;
            padding: 10px 8px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #c4d3e5;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #214478;
            color: white;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #153057;
        }
        .error {
            color: #bb2131;
            margin-bottom: 10px;
        }
	

    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login</h2>
        <form th:action="@{/login}" method="post">
            <div th:if="${loginError}" class="error" th:text="${loginError}"></div>
            <input type="text" name="username" placeholder="Username" required />
            <input type="password" name="password" placeholder="Password" required />
            <button type="submit">Login</button>
			<div style="text-align:center;">
		<br>
		<a href="/" class="button" style="background: #214478; color: #fff;">Return to Home</a>

			</div>
        </form>
    </div>
</body>
</html>
