<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${student.id != null} ? 'Edit Student' : 'Add Student'">Student Form</title>
    <style>
        body { font-family: Arial, sans-serif; background: #e8eefa; margin: 0;}
        .form-container { max-width: 440px; margin: 48px auto; background: white; padding: 32px 24px 24px 24px; border-radius: 12px; box-shadow: 0 8px 28px rgba(50,60,100,0.12); }
        h2 { color: #214478; margin-bottom: 18px; }
        label { display: block; margin-top: 16px; margin-bottom: 4px; color: #444; }
        input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
            width: 98%; padding: 8px; margin-bottom: 8px; border-radius: 6px; border: 1px solid #bcd0e5;
        }
        button { background: #214478; color: #fff; border: none; padding: 11px 22px; border-radius: 7px; font-weight: bold; cursor: pointer; margin-top: 14px; transition: background 0.2s;}
        button:hover { background: #153057; }
        .back-btn { margin-left: 12px; background: #888; color: #fff; padding: 11px 22px; border-radius: 7px; text-decoration: none;}
        .back-btn:hover { background: #444; }
    </style>
</head>
<body>
<div class="form-container">
    <h2 th:text="${student.id != null} ? 'Edit Student' : 'Add Student'"></h2>
    <form th:action="@{/admin/students/save}" th:object="${student}" method="post">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{user.id}" />
        <input type="hidden" name="isNew" th:value="${isNew}" />

        <label>Name:</label>
        <input type="text" th:field="*{name}" required />

        <label>Age:</label>
        <input type="number" th:field="*{age}" min="0" />

        <label>Email:</label>
        <input type="email" th:field="*{email}" />

        <label>Username:</label>
        <input type="text" th:field="*{user.username}" required />

        <label>Password:</label>
        <input type="password" th:field="*{user.password}" th:if="${isNew}" required />
        <input type="password" th:field="*{user.password}" placeholder="Leave blank to keep existing password" th:if="${!isNew}" />

        <button type="submit">Save</button>
        <a href="/admin/students" class="back-btn">Cancel</a>
    </form>
</div>
</body>
</html>
